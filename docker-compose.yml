services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: founderflow-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/var/www/html/storage
    networks:
      - founderflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: founderflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - founderflow-network

networks:
  founderflow-network:
    driver: bridge
